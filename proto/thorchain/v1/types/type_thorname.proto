syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";

import "common/common.proto";
import "gogoproto/gogo.proto";

message THORNameAlias {
  string chain = 1 [ (gogoproto.casttype) =
                         "github.com/decaswap-labs/decanode/common.Chain" ];
  string address = 2 [ (gogoproto.casttype) =
                           "github.com/decaswap-labs/decanode/common.Address" ];
}

message THORName {
  string name = 1;
  int64 expire_block_height = 2;
  bytes owner = 3 [ (gogoproto.casttype) =
                        "github.com/cosmos/cosmos-sdk/types.AccAddress" ];
  common.Asset preferred_asset = 4 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "github.com/decaswap-labs/decanode/common.Asset"
  ];
  repeated THORNameAlias aliases = 5 [ (gogoproto.nullable) = false ];
  int64 preferred_asset_outbound_fee_multiplier = 6;
}
