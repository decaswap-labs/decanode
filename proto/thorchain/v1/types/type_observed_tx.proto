syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";
option (gogoproto.goproto_stringer_all) = false;
option (gogoproto.stringer_all) = false;
option (gogoproto.goproto_getters_all) = false;

import "common/common.proto";
import "types/type_tx_out.proto";
import "gogoproto/gogo.proto";

message ObservedTxVoter {
  string tx_id = 1 [
    (gogoproto.casttype) = "github.com/decaswap-labs/decanode/common.TxID",
    (gogoproto.customname) = "TxID"
  ];
  common.ObservedTx tx = 2 [ (gogoproto.nullable) = false ];
  int64 height = 3;
  repeated common.ObservedTx txs = 4 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) =
        "github.com/decaswap-labs/decanode/common.ObservedTxs"
  ];
  repeated TxOutItem actions = 5 [ (gogoproto.nullable) = false ];
  repeated common.Tx out_txs = 6 [
    (gogoproto.castrepeated) = "github.com/decaswap-labs/decanode/common.Txs",
    (gogoproto.nullable) = false
  ];
  int64 finalised_height = 7;
  bool updated_vault = 8;
  bool reverted = 9;
  int64 outbound_height = 10;
  int64 unfinalized_height = 11;
}
