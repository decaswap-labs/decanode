syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";

import "common/common.proto";
import "gogoproto/gogo.proto";

message MsgSecuredAssetDeposit {
  common.Tx tx = 1 [ (gogoproto.nullable) = false ];
  common.Asset asset = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "github.com/decaswap-labs/decanode/common.Asset"
  ];
  string amount = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Uint",
    (gogoproto.nullable) = false
  ];
  bytes address = 4 [ (gogoproto.casttype) =
                          "github.com/cosmos/cosmos-sdk/types.AccAddress" ];
  bytes signer = 5 [ (gogoproto.casttype) =
                         "github.com/cosmos/cosmos-sdk/types.AccAddress" ];
}

message MsgSecuredAssetWithdraw {
  common.Tx tx = 1 [ (gogoproto.nullable) = false ];
  common.Asset asset = 2 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "github.com/decaswap-labs/decanode/common.Asset"
  ];
  string amount = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Uint",
    (gogoproto.nullable) = false
  ];
  string asset_address = 4
      [ (gogoproto.casttype) =
            "github.com/decaswap-labs/decanode/common.Address" ];
  bytes signer = 5 [ (gogoproto.casttype) =
                         "github.com/cosmos/cosmos-sdk/types.AccAddress" ];
}
