syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";

import "gogoproto/gogo.proto";
import "common/common.proto";

option (gogoproto.marshaler_all) = true;

message QueryVaultRequest {
  string pub_key = 1;
  string height = 2;
}

message QueryVaultResponse {
  int64 block_height = 1;
  string pub_key = 2;
  repeated common.Coin coins = 3 [
    (gogoproto.castrepeated) = "github.com/decaswap-labs/decanode/common.Coins",
    (gogoproto.nullable) = false,
    (gogoproto.jsontag) = "coins"
  ];
  string type = 4;
  string status = 5 [ (gogoproto.jsontag) = "status" ];
  int64 status_since = 6;
  // the list of node public keys which are members of the vault
  repeated string membership = 7;
  repeated string chains = 8;
  int64 inbound_tx_count = 9;
  int64 outbound_tx_count = 10;
  repeated int64 pending_tx_block_heights = 11;
  repeated VaultRouter routers = 12 [ (gogoproto.jsontag) = "routers" ];
  repeated VaultAddress addresses = 13 [ (gogoproto.jsontag) = "addresses" ];
  repeated string frozen = 14;
  string pub_key_eddsa = 15 [ (gogoproto.nullable) = true ];
}

message QueryAsgardVaultsRequest { string height = 1; }

message QueryAsgardVaultsResponse {
  repeated QueryVaultResponse asgard_vaults = 1;
}

message QueryVaultsPubkeysRequest { string height = 1; }

message QueryVaultsPubkeysResponse {
  repeated VaultInfo asgard = 1 [ (gogoproto.jsontag) = "asgard" ];
  repeated VaultInfo inactive = 2 [ (gogoproto.jsontag) = "inactive" ];
}

message VaultInfo {
  string pub_key = 1 [ (gogoproto.jsontag) = "pub_key" ];
  repeated VaultRouter routers = 2 [ (gogoproto.jsontag) = "routers" ];
  string pub_key_eddsa = 3 [ (gogoproto.jsontag) = "pub_key_eddsa" ];
  repeated string membership = 4;
}

message VaultRouter {
  string chain = 1;
  string router = 2;
}

message VaultAddress {
  string chain = 1 [ (gogoproto.jsontag) = "chain" ];
  string address = 2 [ (gogoproto.jsontag) = "address" ];
}

message QueryVaultSolvencyRequest { string height = 1; }

message VaultSolvencyAsset {
  common.Asset asset = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "github.com/decaswap-labs/decanode/common.Asset",
    (gogoproto.jsontag) = "asset"
  ];
  string amount = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (gogoproto.jsontag) = "amount"
  ];
}

message QueryVaultSolvencyResponse {
  repeated VaultSolvencyAsset assets = 1 [ (gogoproto.jsontag) = "assets" ];
}
