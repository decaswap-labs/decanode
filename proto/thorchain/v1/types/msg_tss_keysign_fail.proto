syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";
option (gogoproto.goproto_getters_all) = false;

import "types/type_blame.proto";
import "common/common.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";

message MsgTssKeysignFail {
  option (amino.name) = "thorchain/TssKeysignFail";

  string id = 1 [ (gogoproto.customname) = "ID" ];
  int64 height = 2;
  Blame blame = 3 [ (gogoproto.nullable) = false ];
  string memo = 4;
  repeated common.Coin coins = 5 [
    (gogoproto.castrepeated) = "github.com/decaswap-labs/decanode/common.Coins",
    (gogoproto.nullable) = false
  ];
  string pub_key = 6 [ (gogoproto.casttype) =
                           "github.com/decaswap-labs/decanode/common.PubKey" ];
  bytes signer = 7 [
    (gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.AccAddress",
    (amino.encoding) = "bech32"
  ];
}
