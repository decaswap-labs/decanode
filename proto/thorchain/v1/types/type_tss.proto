syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";
option (gogoproto.goproto_stringer_all) = false;
option (gogoproto.stringer_all) = false;
option (gogoproto.goproto_getters_all) = false;

import "gogoproto/gogo.proto";

message TssVoter {
  string id = 1 [ (gogoproto.customname) = "ID" ];
  string pool_pub_key = 2
      [ (gogoproto.casttype) =
            "github.com/decaswap-labs/decanode/common.PubKey" ];
  repeated string pub_keys = 3;
  int64 block_height = 4;
  repeated string chains = 5;
  repeated string signers = 6;
  int64 majority_consensus_block_height = 7;
  repeated string secp256k1_signatures = 8;
  string pool_pub_key_eddsa = 9 [
    (gogoproto.casttype) = "github.com/decaswap-labs/decanode/common.PubKey",
    (gogoproto.nullable) = true
  ];
}
