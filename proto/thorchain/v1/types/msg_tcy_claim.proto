syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";

import "common/common.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";

message MsgTCYClaim {
  string rune_address = 1
      [ (gogoproto.casttype) =
            "github.com/decaswap-labs/decanode/common.Address" ];
  string l1_address = 2
      [ (gogoproto.casttype) =
            "github.com/decaswap-labs/decanode/common.Address" ];
  bytes signer = 3 [
    (gogoproto.casttype) = "github.com/cosmos/cosmos-sdk/types.AccAddress",
    (amino.encoding) = "bech32"
  ];
}
