syntax = "proto3";
package types;

option go_package = "github.com/decaswap-labs/decanode/x/thorchain/types";

import "common/common.proto";
import "gogoproto/gogo.proto";

message MsgManageTHORName {
  string name = 1;
  string chain = 2 [ (gogoproto.casttype) =
                         "github.com/decaswap-labs/decanode/common.Chain" ];
  string address = 3 [ (gogoproto.casttype) =
                           "github.com/decaswap-labs/decanode/common.Address" ];
  common.Coin coin = 4 [ (gogoproto.nullable) = false ];
  int64 expire_block_height = 5;
  common.Asset preferred_asset = 6 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "github.com/decaswap-labs/decanode/common.Asset"
  ];
  bytes owner = 7 [ (gogoproto.casttype) =
                        "github.com/cosmos/cosmos-sdk/types.AccAddress" ];
  bytes signer = 8 [ (gogoproto.casttype) =
                         "github.com/cosmos/cosmos-sdk/types.AccAddress" ];
  int64 preferred_asset_outbound_fee_multiplier = 9;
}
