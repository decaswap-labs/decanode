    get:
      description: Returns limit swaps with pagination and filtering.
      operationId: limitSwaps
      parameters:
      - description: "optional block height, defaults to current tip"
        explode: true
        in: query
        name: height
        required: false
        schema:
          format: int64
          minimum: 0
          type: integer
        style: form
      - description: Number of items to skip
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - description: Number of items to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          type: integer
        style: form
      - description: "Filter by source asset (e.g., \"BTC.BTC\")"
        explode: true
        in: query
        name: source_asset
        required: false
        schema:
          type: string
        style: form
      - description: "Filter by target asset (e.g., \"ETH.ETH\")"
        explode: true
        in: query
        name: target_asset
        required: false
        schema:
          type: string
        style: form
      - description: Filter by sender address
        explode: true
        in: query
        name: sender
        required: false
        schema:
          type: string
        style: form
      - description: Sort by field
        explode: true
        in: query
        name: sort_by
        required: false
        schema:
          default: ratio
          enum:
          - ratio
          - age
          - amount
          - created_height
          type: string
        style: form
      - description: Sort order
        explode: true
        in: query
        name: sort_order
        required: false
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitSwapsResponse'
          description: OK
      tags:
      - Queue
