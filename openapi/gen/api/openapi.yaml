      in: path
      name: name
      required: true
      schema:
        example: v3.137.0
        type: string
      style: simple
    pathHeight:
      explode: false
      in: path
      name: height
      required: true
      schema:
        format: int64
        minimum: 0
        type: integer
      style: simple
    hash:
      explode: false
      in: path
      name: hash
      required: true
      schema:
        example: CF524818D42B63D25BBA0CCC4909F127CAA645C0F9CD07324F2824CC151A64C7
        type: string
      style: simple
    asset:
      explode: false
      in: path
      name: asset
      required: true
      schema:
        example: BTC.BTC
        type: string
      style: simple
    address:
      explode: false
      in: path
      name: address
      required: true
      schema:
        example: thor1zupk5lmc84r2dh738a9g3zscavannjy3nzplwt
        type: string
      style: simple
    pubkey:
      explode: false
      in: path
      name: pubkey
      required: true
      schema:
        example: thorpub1addwnpepq068dr0x7ue973drmq4eqmzhcq3650n7nx5fhgn9gl207luxp6vaklu52tc
        type: string
      style: simple
    chain:
      explode: false
      in: path
      name: chain
      required: true
      schema:
        example: BTC
        type: string
      style: simple
    invariant:
      explode: false
      in: path
      name: invariant
      required: true
      schema:
        example: asgard
        type: string
      style: simple
    symbol:
      explode: false
      in: path
      name: symbol
      required: true
      schema:
        example: BTC
        type: string
      style: simple
  schemas:
    Pool:
      example:
        volume_rune: "123456"
        synth_units: "0"
        volume_asset: "123456"
        savers_fill_bps: "4500"
        savers_depth: "199998"
        savers_units: "199998"
        derived_depth_bps: "123456"
        balance_asset: "3197744873"
        synth_supply: "0"
        savers_capacity_remaining: "1000"
        trading_halted: false
        asset_tor_price: "123456"
        synth_mint_paused: true
        pending_inbound_rune: "464993836"
        decimals: 6
        LP_units: "14694928607473"
        balance_rune: "13460619152985"
        asset: BTC.BTC
        pool_units: "14694928607473"
        synth_supply_remaining: "123456"
        short_code: b
        status: Available
        pending_inbound_asset: "101713319"
      properties:
        asset:
          example: BTC.BTC
          type: string
        short_code:
          example: b
          type: string
        status:
          example: Available
          type: string
        decimals:
          example: 6
          format: int64
          type: integer
        pending_inbound_asset:
          example: "101713319"
          type: string
        pending_inbound_rune:
          example: "464993836"
          type: string
        balance_asset:
          example: "3197744873"
          type: string
        balance_rune:
          example: "13460619152985"
          type: string
        asset_tor_price:
          description: the USD (TOR) price of the asset in 1e8
          example: "123456"
          type: string
        pool_units:
          description: "the total pool units, this is the sum of LP and synth units"
          example: "14694928607473"
          type: string
        LP_units:
          description: the total pool liquidity provider units
          example: "14694928607473"
          type: string
        synth_units:
          description: the total synth units in the pool
          example: "0"
          type: string
        synth_supply:
          description: the total supply of synths for the asset
          example: "0"
          type: string
        savers_depth:
          description: the balance of L1 asset deposited into the Savers Vault
          example: "199998"
          type: string
        savers_units:
          description: the number of units owned by Savers
          example: "199998"
          type: string
        savers_fill_bps:
          description: "the filled savers capacity in basis points, 4500/10000 = 45%"
          example: "4500"
          type: string
        savers_capacity_remaining:
          description: amount of remaining capacity in asset
          example: "1000"
          type: string
        synth_mint_paused:
          description: whether additional synths cannot be minted
          example: true
          type: boolean
        synth_supply_remaining:
          description: the amount of synth supply remaining before the current max
            supply is reached
          example: "123456"
          type: string
        derived_depth_bps:
          description: the depth of the derived virtual pool relative to L1 pool (in
            basis points)
          example: "123456"
          type: string
        trading_halted:
          description: indicates if the pool can be used for swaps
          example: false
          type: boolean
        volume_asset:
          description: 24h volume in asset
          example: "123456"
          type: string
        volume_rune:
          description: 24h volume in rune
          example: "123456"
          type: string
      required:
      - LP_units
      - asset
      - asset_tor_price
      - balance_asset
      - balance_rune
      - derived_depth_bps
      - pending_inbound_asset
      - pending_inbound_rune
      - pool_units
      - savers_capacity_remaining
      - savers_depth
      - savers_fill_bps
      - savers_units
      - status
      - synth_mint_paused
      - synth_supply
      - synth_supply_remaining
      - synth_units
      type: object
    DerivedPool:
      example:
        decimals: 6
        balance_rune: "13460619152985"
        asset: BTC.BTC
        derived_depth_bps: "123456"
        status: Available
        balance_asset: "3197744873"
      properties:
        asset:
          example: BTC.BTC
          type: string
        status:
          example: Available
          type: string
        decimals:
          example: 6
          format: int64
          type: integer
        balance_asset:
          example: "3197744873"
          type: string
        balance_rune:
          example: "13460619152985"
          type: string
        derived_depth_bps:
          description: the depth of the derived virtual pool relative to L1 pool (in
