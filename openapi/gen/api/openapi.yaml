        style: form
      - description: the source asset
        explode: true
        in: query
        name: from_asset
        required: false
        schema:
          example: BTC.BTC
          type: string
        style: form
      - description: the target asset
        explode: true
        in: query
        name: to_asset
        required: false
        schema:
          example: ETH.ETH
          type: string
        style: form
      - description: the source asset amount in 1e8 decimals
        explode: true
        in: query
        name: amount
        required: false
        schema:
          example: 1000000
          format: int64
          type: integer
        style: form
      - description: "the destination address, required to generate memo"
        explode: true
        in: query
        name: destination
        required: false
        schema:
          example: 0x1c7b17362c84287bd1184447e6dfeaf920c31bbe
          type: string
        style: form
      - description: "the refund address, refunds will be sent here if the swap fails"
        explode: true
