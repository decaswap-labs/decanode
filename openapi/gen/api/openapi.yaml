openapi: 3.0.0
info:
  contact:
    email: devs@thorchain.org
  description: Thornode REST API.
  title: Thornode API
  version: 3.17.0
servers:
- url: /
paths:
  /auth/accounts/{address}:
    get:
      description: Returns account information for the provided address.
      operationId: account
      parameters:
      - description: "optional block height, defaults to current tip"
        explode: true
        in: query
        name: height
        required: false
        schema:
          format: int64
          minimum: 0
          type: integer
        style: form
      - explode: false
        in: path
        name: address
        required: true
        schema:
          example: thor1zupk5lmc84r2dh738a9g3zscavannjy3nzplwt
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
          description: OK
      tags:
      - Auth
  /bank/balances/{address}:
