########################################################################################
# Rapid Swap Market-Only Iterations
# Verifies market-only mode still executes full rapid iterations for market swaps.
########################################################################################

type: env
key: L1_SLIP_MIN_BPS
value: "50"
---
{{ template "default-state.yaml" }}
---
{{ template "btc-eth-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
type: tx-mimir
key: EnableAdvSwapQueue
value: 2
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 3
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: MinSwapsPerBlock
value: 2
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: MaxSwapsPerBlock
value: 10
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${TXID_1={{ observe_txid 1 }}}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "5000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "=:ETH.ETH:{{ addr_eth_fox }}"
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
  - tx:
      id: "${TXID_2={{ observe_txid 2 }}}"
      chain: ETH
      from_address: {{ addr_eth_fox }}
      to_address: {{ addr_eth_dog }}
      coins:
        - amount: "50000000"
          asset: "ETH.ETH"
          decimals: 8
      gas:
        - amount: "960000"
          asset: "ETH.ETH"
      memo: "=:BTC.BTC:{{ addr_btc_fox }}"
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_1}
asserts:
  - .swap.state.count >= 1
  - .swap.state.quantity > .swap.state.count
  - .queue_type == "advanced"
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_2}
asserts:
  - .queue_type == "advanced"
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap
asserts:
  - any(.tx.id == "${TXID_1}")
  - any(.tx.id == "${TXID_2}")
  - .|length == 2
---
type: create-blocks
count: 12
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap
asserts:
  - .|length == 0
---
type: check
endpoint: http://localhost:1317/thorchain/invariant/asgard
asserts:
  - .broken == false
---
type: tx-mimir
key: MinSwapsPerBlock
value: -1
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: MaxSwapsPerBlock
value: -1
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/invariant/asgard
asserts:
  - .broken == false
