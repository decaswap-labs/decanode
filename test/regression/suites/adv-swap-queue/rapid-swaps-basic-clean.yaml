{{ template "default-state.yaml" }}
---
{{ template "btc-eth-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
# Enable advanced swap queue
type: tx-mimir
key: EnableAdvSwapQueue
value: 1
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/pools
asserts:
  - .|length == 2
---
########################################################################################
# Test 1: Default behavior - single iteration (AdvSwapQueueRapidSwapMax not set)
########################################################################################
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: "${TXID_1={{ observe_txid 1 }}}"
    chain: BTC
    from_address: {{ addr_btc_fox }}
    to_address: {{ addr_btc_dog }}
    coins:
      - amount: "1000000"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10000"
        asset: "BTC.BTC"
    memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
  block_height: 1
  finalise_height: 1
  observed_pub_key: {{ pubkey_dog }}
- tx:
    id: "${TXID_2={{ observe_txid 2 }}}"
    chain: ETH
    from_address: {{ addr_eth_fox }}
    to_address: {{ addr_eth_dog }}
    coins:
      - amount: "10000000"
        asset: "ETH.ETH"
        decimals: 8
    gas:
      - amount: "960000"
        asset: "ETH.ETH"
    memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
  block_height: 1
  finalise_height: 1
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# Check RUNE balance after single iteration processing
type: check
endpoint: http://localhost:1317/cosmos/bank/v1beta1/balances/{{ addr_thor_fox }}
asserts:
  - .balances[]|select(.denom == "rune")|.amount|tonumber > 2400000000000
---
########################################################################################
# Test 2: Set AdvSwapQueueRapidSwapMax = 2 and test with more swaps
########################################################################################
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 2
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
# Submit 4 swaps that should be processed in 2 iterations
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: "${TXID_3={{ observe_txid 3 }}}"
    chain: BTC
    from_address: {{ addr_btc_fox }}
    to_address: {{ addr_btc_dog }}
    coins:
      - amount: "2000000"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10000"
        asset: "BTC.BTC"
    memo: "=:ETH.ETH:{{ addr_eth_fox }}"
  block_height: 2
  finalise_height: 2
  observed_pub_key: {{ pubkey_dog }}
- tx:
    id: "${TXID_4={{ observe_txid 4 }}}"
    chain: ETH
    from_address: {{ addr_eth_fox }}
    to_address: {{ addr_eth_dog }}
    coins:
      - amount: "20000000"
        asset: "ETH.ETH"
        decimals: 8
    gas:
      - amount: "960000"
        asset: "ETH.ETH"
    memo: "=:BTC.BTC:{{ addr_btc_fox }}"
  block_height: 2
  finalise_height: 2
  observed_pub_key: {{ pubkey_dog }}
---
type: tx-deposit
signer: {{ addr_thor_fox }}
coins:
  - amount: "3000000000"
    asset: "rune"
memo: "=:BTC.BTC:{{ addr_btc_fox }}"
---
type: tx-deposit
signer: {{ addr_thor_fox }}
coins:
  - amount: "5000000000"
    asset: "rune"
memo: "=:ETH.ETH:{{ addr_eth_fox }}"
---
type: create-blocks
count: 1
---
# Check that outbound queue has items (should be processed across 2 iterations)
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - length >= 2  # Should have processed multiple swaps with 2 iterations
---
########################################################################################
# Test 3: Early exit test - submit limited swaps with high iteration count
########################################################################################
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 10
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
# Submit only 2 swaps with mimir = 10 (should exit early after processing these)
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: "${TXID_5={{ observe_txid 5 }}}"
    chain: BTC
    from_address: {{ addr_btc_fox }}
    to_address: {{ addr_btc_dog }}
    coins:
      - amount: "500000"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10000"
        asset: "BTC.BTC"
    memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
  block_height: 5
  finalise_height: 5
  observed_pub_key: {{ pubkey_dog }}
- tx:
    id: "${TXID_6={{ observe_txid 6 }}}"
    chain: ETH
    from_address: {{ addr_eth_fox }}
    to_address: {{ addr_eth_dog }}
    coins:
      - amount: "5000000"
        asset: "ETH.ETH"
        decimals: 8
    gas:
      - amount: "960000"
        asset: "ETH.ETH"
    memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
  block_height: 5
  finalise_height: 5
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# Verify swaps were processed (RUNE balance should increase)
type: check
endpoint: http://localhost:1317/cosmos/bank/v1beta1/balances/{{ addr_thor_fox }}
asserts:
  - .balances[]|select(.denom == "rune")|.amount|tonumber > 2400000000000
---
########################################################################################
# Test 4: Reset to default and verify backward compatibility
########################################################################################
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 1
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
# Submit single swap
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: "${TXID_7={{ observe_txid 7 }}}"
    chain: BTC
    from_address: {{ addr_btc_fox }}
    to_address: {{ addr_btc_dog }}
    coins:
      - amount: "1000000"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10000"
        asset: "BTC.BTC"
    memo: "=:ETH.ETH:{{ addr_eth_fox }}"
  block_height: 6
  finalise_height: 6
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# Should have outbound for the swap
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - length >= 1
  - any(.in_hash == "${TXID_7}")
---
# Final invariant check
type: check
endpoint: http://localhost:1317/thorchain/invariant/asgard
asserts:
  - .broken == false