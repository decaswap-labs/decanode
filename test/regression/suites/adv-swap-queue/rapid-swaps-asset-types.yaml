########################################################################################
# Rapid Swap Asset Types (Deterministic)
# Covers L1, native-destination, and trade assets.
########################################################################################

type: env
key: L1_SLIP_MIN_BPS
value: "50"
---
type: env
key: TRADE_ACCOUNTS_SLIP_MIN_BPS
value: "50"
---
{{ template "default-state.yaml" }}
---
{{ template "btc-eth-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
type: tx-mimir
key: EnableAdvSwapQueue
value: 1
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 3
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: TradeAccountsEnabled
value: 1
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
# L1 -> Native
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${TXID_1={{ observe_txid 1 }}}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "5000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_1}
asserts:
  - .queue_type == "advanced"
  - .swap.tx.coins[0].asset == "BTC.BTC"
  - .swap.target_asset == "THOR.RUNE"
  - .swap.state.count >= 1
---
# trade asset setup
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${TXID_2={{ observe_txid 2 }}}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "20000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "trade+:{{ addr_thor_fox }}"
    block_height: 2
    finalise_height: 2
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# Trade -> Native
type: tx-deposit
signer: {{ addr_thor_fox }}
coins:
  - amount: "10000000"
    asset: "BTC~BTC"
memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/{{ native_txid -1 }}
asserts:
  - .queue_type == "advanced"
  - .swap.tx.coins[0].asset == "BTC~BTC"
  - .swap.target_asset == "THOR.RUNE"
  - .swap.state.count >= 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap
asserts:
  - .|length >= 1
---
type: create-blocks
count: 10
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap
asserts:
  - .|length <= 1
---
type: check
endpoint: http://localhost:1317/thorchain/invariant/asgard
asserts:
  - .broken == false
