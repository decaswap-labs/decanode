########################################################################################
# Rapid Swap Exit Conditions (Deterministic)
########################################################################################

type: env
key: L1_SLIP_MIN_BPS
value: "50"
---
{{ template "default-state.yaml" }}
---
{{ template "btc-eth-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
type: tx-mimir
key: EnableAdvSwapQueue
value: 1
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 10
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
# Empty queue with high rapid max
type: check
endpoint: http://localhost:1317/thorchain/queue/swap
asserts:
  - .|length == 0
---
# Same-direction pair exits early (count remains 1)
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${TXID_1={{ observe_txid 1 }}}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "5000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
  - tx:
      id: "${TXID_2={{ observe_txid 2 }}}"
      chain: BTC
      from_address: {{ addr_btc_cat }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "5000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "=:THOR.RUNE:{{ addr_thor_cat }}"
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_1}
asserts:
  - .swap.state.count == 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_2}
asserts:
  - .swap.state.count == 1
---
# PoolCycle blocks processing
type: tx-mimir
key: PoolCycle
value: 1
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${TXID_3={{ observe_txid 3 }}}"
      chain: ETH
      from_address: {{ addr_eth_fox }}
      to_address: {{ addr_eth_dog }}
      coins:
        - amount: "50000000"
          asset: "ETH.ETH"
          decimals: 8
      gas:
        - amount: "960000"
          asset: "ETH.ETH"
      memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
    block_height: 2
    finalise_height: 2
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_3}
asserts:
  - .swap.state.in == "0"
  - .swap.state.out == "0"
---
# market-only mode still processes market swaps
type: tx-mimir
key: PoolCycle
value: 100
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: EnableAdvSwapQueue
value: 2
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${TXID_4={{ observe_txid 4 }}}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "5000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
    block_height: 3
    finalise_height: 3
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_4}
asserts:
  - .swap.state.count >= 1
---
type: check
endpoint: http://localhost:1317/thorchain/invariant/asgard
asserts:
  - .broken == false
---
type: fail-export-invariants
