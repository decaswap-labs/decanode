{{ template "default-state.yaml" }}
---
{{ template "btc-eth-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
# Enable advanced swap queue
type: tx-mimir
key: EnableAdvSwapQueue
value: 1
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
# Test default behavior (AdvSwapQueueRapidSwapMax not set, should be 1 iteration)
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 1 }}'
    chain: BTC
    from_address: {{ addr_btc_fox }}
    to_address: {{ addr_btc_dog }}
    coins:
      - amount: "1000000"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10000"
        asset: "BTC.BTC"
    memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
  block_height: 1
  finalise_height: 1
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# Test with AdvSwapQueueRapidSwapMax = 3 (should do 3 iterations)
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 3
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
# Submit multiple swaps to test rapid iterations
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 2 }}'
    chain: BTC
    from_address: {{ addr_btc_fox }}
    to_address: {{ addr_btc_dog }}
    coins:
      - amount: "1000000"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10000"
        asset: "BTC.BTC"
    memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
  block_height: 2
  finalise_height: 2
  observed_pub_key: {{ pubkey_dog }}
- tx:
    id: '{{ observe_txid 3 }}'
    chain: ETH
    from_address: {{ addr_eth_fox }}
    to_address: {{ addr_eth_dog }}
    coins:
      - amount: "10000000"
        asset: "ETH.ETH"
        decimals: 8
    gas:
      - amount: "960000"
        asset: "ETH.ETH"
    memo: "=:BTC.BTC:{{ addr_btc_fox }}"
  block_height: 2
  finalise_height: 2
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# Basic verification that swaps processed
type: check
endpoint: http://localhost:1317/cosmos/bank/v1beta1/balances/{{ addr_thor_fox }}
asserts:
  - .balances[]|select(.denom == "rune")|.amount|tonumber > 2400000000000