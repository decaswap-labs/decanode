asserts:
  - length == 1
  - .[0].in_hash == "{{ observe_txid 5 }}"
  - .[0].original_memo == "REFUND:{{ observe_txid 5 }}"
  - .[0].to_address == "{{ addr_btc_fox }}"
  - .[0].coin.amount == "${REFUND_AMOUNT=993000}"
---
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 6 }}'
    chain: BTC
    from_address: {{ addr_btc_dog }}
    to_address: {{ addr_btc_fox }}
    coins:
      - amount: "${REFUND_AMOUNT}"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10500"
        asset: "BTC.BTC"
    memo: "REFUND:{{ observe_txid 5 }}"
  block_height: 3
  finalise_height: 3
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 0
---
########################################################################################
# gas payment test - verify gas deduction
########################################################################################
