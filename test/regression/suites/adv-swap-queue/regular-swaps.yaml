    from_address: {{ addr_eth_fox }}
    to_address: {{ addr_eth_dog }}
    coins:
      - amount: "100000000"
        asset: "ETH.ETH"
        decimals: 8
    gas:
      - amount: "960000"
        asset: "ETH.ETH"
    memo: "=:BTC.BTC:{{ addr_btc_fox }}"
  block_height: 3
  finalise_height: 3
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - length == 1
  - .[0].in_hash == "{{ observe_txid 7 }}"
  - .[0].coin.amount == "${BTC_OUT_AMOUNT=7621293}"
---
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 8 }}'
    chain: BTC
    from_address: {{ addr_btc_dog }}
    to_address: {{ addr_btc_fox }}
    coins:
      - amount: "${BTC_OUT_AMOUNT}"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10500"
        asset: "BTC.BTC"
    memo: "OUT:{{ observe_txid 7 }}"
  block_height: 4
  finalise_height: 4
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 0
---
########################################################################################
# multiple concurrent swaps
########################################################################################
# First swap: BTC -> RUNE
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 9 }}'
    chain: BTC
    from_address: {{ addr_btc_fox }}
    to_address: {{ addr_btc_dog }}
    coins:
      - amount: "2000000"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10000"
        asset: "BTC.BTC"
    memo: "=:THOR.RUNE:{{ addr_thor_fox }}"
  block_height: 5
  finalise_height: 5
  observed_pub_key: {{ pubkey_dog }}
---
# Second swap: RUNE -> ETH (same block)
type: tx-deposit
signer: {{ addr_thor_fox }}
coins:
  - amount: "5000000000"
    asset: "rune"
memo: "=:ETH.ETH:{{ addr_eth_fox }}"
---
# Third swap: ETH -> BTC (observed in same block)
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 10 }}'
    chain: ETH
    from_address: {{ addr_eth_fox }}
    to_address: {{ addr_eth_dog }}
    coins:
      - amount: "50000000"
        asset: "ETH.ETH"
        decimals: 8
    gas:
      - amount: "960000"
        asset: "ETH.ETH"
    memo: "=:BTC.BTC:{{ addr_btc_fox }}"
  block_height: 4
  finalise_height: 4
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# Check that EnableAdvSwapQueue mimir is active
type: check
endpoint: http://localhost:1317/thorchain/mimir/key/EnableAdvSwapQueue
asserts:
  - . == 1  # Advanced swap queue should be enabled
---
# Check pools to ensure swaps were processed
type: check
endpoint: http://localhost:1317/thorchain/pool/BTC.BTC
asserts:
  - .balance_rune != "100000000000000"  # Pool should have changed from initial state
---
type: check
endpoint: http://localhost:1317/thorchain/pool/ETH.ETH
asserts:
  - .balance_rune != "100000000000000"  # Pool should have changed from initial state
---
# With advanced swap queue, outbounds are created differently by the queue manager
# The number and timing of outbounds may vary from regular swap queue
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - length >= 1  # At least one outbound should be queued
---
# Check RUNE balance after swaps
# The balance should reflect:
# 1. Initial balance + RUNE from first swap (BTC->RUNE)
# 2. Minus RUNE spent in second swap (RUNE->ETH)
type: check
endpoint: http://localhost:1317/cosmos/bank/v1beta1/balances/{{ addr_thor_fox }}
asserts:
  - .balances[]|select(.denom == "rune")|.amount|tonumber > 0  # Should have some RUNE
  - .balances[]|select(.denom == "rune")|.amount|tonumber < 2510000000000  # Less than initial + first swap due to second swap
---
# Process outbound transactions
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 11 }}'
    chain: ETH
    from_address: {{ addr_eth_dog }}
    to_address: {{ addr_eth_fox }}
    coins:
      - amount: "${ETH_OUT_AMOUNT=49012706}"
        asset: "ETH.ETH"
        decimals: 8
    gas:
      - amount: "960000"
        asset: "ETH.ETH"
    memo: "OUT:4C1F03B4241FDCAA580998049B3CE64D68ED6CF200B8ACEA8D77F748DBD18DBE"
  block_height: 5
  finalise_height: 5
  observed_pub_key: {{ pubkey_dog }}
---
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
- tx:
    id: '{{ observe_txid 12 }}'
    chain: BTC
    from_address: {{ addr_btc_dog }}
    to_address: {{ addr_btc_fox }}
    coins:
      - amount: "${BTC_OUT_AMOUNT2=25723128}"
        asset: "BTC.BTC"
        decimals: 8
    gas:
      - amount: "10500"
        asset: "BTC.BTC"
    memo: "OUT:{{ observe_txid 10 }}"
  block_height: 5
  finalise_height: 5
  observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
# With advanced swap queue, outbound processing may differ
# There might still be pending outbounds at this point
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length >= 0  # May have pending outbounds with adv swap queue
---
