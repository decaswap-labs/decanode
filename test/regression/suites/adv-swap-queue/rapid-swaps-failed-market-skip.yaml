########################################################################################
# Rapid Swap Failed Market Attempt Accounting
# Verifies failed market swaps on iteration 1+ do not burn additional attempts.
########################################################################################

type: env
key: L1_SLIP_MIN_BPS
value: "50"
---
{{ template "default-state.yaml" }}
---
{{ template "btc-eth-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
type: tx-mimir
key: EnableAdvSwapQueue
value: 1
signer: {{ addr_thor_dog }}
---
type: tx-mimir
key: AdvSwapQueueRapidSwapMax
value: 5
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${TXID_1={{ observe_txid 1 }}}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "5000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "=:THOR.RUNE:{{ addr_thor_fox }}:999999999999999999"
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_1}
asserts:
  - .swap.state.count == 1
  - .swap.state.failed_swaps|length == 1
  - .swap.state.failed_swap_reasons|length == 1
  - .swap.state.quantity > .swap.state.count
  - .queue_type == "advanced"
---
# Next block should add exactly one more failed attempt (iteration 0 only),
# proving iteration 1+ failures do not increment count.
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/${TXID_1}
asserts:
  - .swap.state.count == 2
  - .swap.state.failed_swaps|length == 2
  - .swap.state.failed_swap_reasons|length == 2
---
type: create-blocks
count: 20
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap
asserts:
  - .|map(select(.tx.id == "${TXID_1}"))|length == 0
---
type: check
endpoint: http://localhost:1317/thorchain/invariant/asgard
asserts:
  - .broken == false
