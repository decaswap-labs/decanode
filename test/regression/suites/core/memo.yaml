---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 1
  - .[0]|.in_hash == "{{ observe_txid 16 }}"
  - .[0]|.original_memo|startswith("REFUND:")
---
# Verify tx details endpoint shows that refund transaction has empty memo (usage exceeded)
type: check
endpoint: http://localhost:1317/thorchain/tx/details/{{ observe_txid 16 }}
asserts:
  - .tx.tx.id == "{{ observe_txid 16 }}"
  - (.tx.tx.memo | length) == 0
---
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 17 }}"
      chain: ETH
      from_address: {{ addr_eth_dog }}
      to_address: {{ addr_eth_fox }}
      coins:
        - amount: "4359808"
          asset: "ETH.ETH"
          decimals: 8
      gas:
        - amount: "960000"
          asset: "ETH.ETH"
      memo: "REFUND:{{ observe_txid 16 }}"
    block_height: 33
    finalise_height: 33
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 0
---
########################################################################################
# test memoless with native RUNE - register reference memo
########################################################################################
type: tx-deposit
signer: {{ addr_thor_fox }}
coins:
  - amount: "0"
    asset: "rune"
memo: "reference:RUNE:=:BTC.BTC:{{ addr_btc_fox }}"
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/memo/THOR.RUNE/00001
asserts:
  - .asset == "THOR.RUNE"
  - .memo == "=:BTC.BTC:{{ addr_btc_fox }}"
  - .reference == "00001"
  - .registered_by == "{{ addr_thor_fox }}"
---
########################################################################################
# test using RUNE reference memo with explicit reference r:00001
########################################################################################
type: tx-deposit
signer: {{ addr_thor_fox }}
coins:
  - amount: "50000000"
    asset: "rune"
memo: "r:00001"
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 1
  - .[0]|.original_memo|startswith("OUT:")
---
type: check
endpoint: http://localhost:1317/thorchain/tx/details/{{ native_txid -1 }}
asserts:
  - .tx.tx.memo == "=:BTC.BTC:{{ addr_btc_fox }}"
---
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 18 }}"
      chain: BTC
      from_address: {{ addr_btc_dog }}
      to_address: {{ addr_btc_fox }}
      coins:
        - amount: "38276"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "OUT:{{ native_txid -1 }}"
    block_height: 35
    finalise_height: 35
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 0
---
