{{ template "default-state.yaml" }}
---
{{ template "btc-pool-state-multiple-vaults.yaml" }}
---
# Override pool balance to account for the 200M BTC coming in via noop
# Total vaults after noop: 250M (dog) + 50M (fox) = 300M
# Also set DollarsPerRune for proper threshold calculation
type: state
genesis:
  app_state:
    bank:
      balances:
        - address: {{ addr_module_asgard }}
          coins:
            - amount: "300000000000"
              denom: rune
    thorchain:
      mimirs:
        - key: DollarsPerRune
          value: "500000000"
      pools:
        - LP_units: "100000000000"
          asset: BTC.BTC
          balance_asset: "300000000"
          balance_rune: "300000000000"
          decimals: "8"
          pending_inbound_asset: "0"
          pending_inbound_rune: "0"
          status: Available
          synth_units: "0"
      liquidity_providers:
        - asset: BTC.BTC
          asset_address: {{ addr_btc_cat }}
          asset_deposit_value: "300000000"
          last_add_height: "1"
          pending_asset: "0"
          pending_rune: "0"
          rune_address: {{ addr_thor_cat }}
          rune_deposit_value: "300000000000"
          units: "100000000000"
---
type: create-blocks
count: 1
---
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 1 }}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "200000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "noop"
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: tx-solvency
signer: {{ addr_thor_dog }}
chain: "BTC"
pub_key: {{ pubkey_dog }}
coins:
  - amount: "99000000"
    asset: "BTC.BTC"
    decimals: 8
Height: 1
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/mimir
asserts:
- .["SOLVENCYHALTBTCCHAIN"] == 3
---
type: tx-solvency
signer: {{ addr_thor_fox }}
chain: "BTC"
pub_key: {{ pubkey_fox }}
coins:
  - amount: "100000000"
    asset: "BTC.BTC"
    decimals: 8
Height: 2
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/auth/accounts/{{ addr_thor_fox }}
asserts:
  - .result.value.sequence == "0"
