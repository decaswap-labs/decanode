{{ template "default-state.yaml" }}
---
{{ template "btc-eth-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
type: create-blocks
count: 1
---
########################################################################################
# verify initial amounts
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/nodes
params: {}
status: 200
asserts:
  - .|length == 1 # single node
  - .[] | select(.node_address == "{{ addr_thor_dog }}") | .total_bond == "5000000000000"
---
type: check
endpoint: http://localhost:1317/thorchain/outbound_fee/eth.eth
asserts:
  - .[0].fee_spent_rune == "0"
---
########################################################################################
# observe a cancel transaction (EVM, gas asset, amount=1 (dust), vault-to-vault)
# this simulates bifrost sending a cancel tx to unstuck a pending transaction
########################################################################################
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 1 }}"
      chain: ETH
      from_address: {{ addr_eth_dog }}
      to_address: {{ addr_eth_dog }} # vault-to-vault
      coins:
        - amount: "1000" # dust amount for validation, treated as zero for cancel
          asset: "ETH.ETH"
          decimals: 8
      gas:
        - amount: "21000"
          asset: "ETH.ETH"
      memo: ""
    block_height: 1
    finalise_height: 1
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
########################################################################################
# verify no slashing occurred
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/nodes
params: {}
status: 200
asserts:
  - .|length == 1
  - .[] | select(.node_address == "{{ addr_thor_dog }}") | .total_bond == "5000000000000" # no slashing for cancel tx
---
########################################################################################
# verify no security event was emitted for cancel tx
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/block
asserts:
  - '[.end_block_events[] | select(.type == "security")]|length == 0'
---
########################################################################################
# verify cancel gas was accounted in the outbound fee multiplier
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/outbound_fee/eth.eth
asserts:
  - .[0].fee_spent_rune == "2100034"
---
########################################################################################
# observe a non-cancel transaction (amount > dust, external to) - should slash
########################################################################################
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 2 }}"
      chain: ETH
      from_address: {{ addr_eth_dog }}
      to_address: {{ addr_eth_cat }} # external
      coins:
        - amount: "1000" # not dust
          asset: "ETH.ETH"
          decimals: 8
      gas:
        - amount: "21000"
          asset: "ETH.ETH"
      memo: "=:BTC.BTC:bc1qxhmdufsvnuaaaer4ynz88fspdsxq2h9e9cetdj" # inbound swap memo on outbound - should trigger slashing
    block_height: 2
    finalise_height: 2
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
########################################################################################
# verify slashing occurred for non-cancel
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/nodes
params: {}
status: 200
asserts:
  - .|length == 1
  - .[] | select(.node_address == "{{ addr_thor_dog }}") | .total_bond|tonumber < 5000000000000 # slashed
---
########################################################################################
# verify slash event was emitted for non-cancel
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/block
asserts:
  - '[.txs[].result.events[] | select(.type == "slash")]|length > 0' # check tx events for slash on non-cancel
---
########################################################################################
# outbound fee should be unchanged (was covered by the slash)
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/outbound_fee/eth.eth
asserts:
  - .[0].fee_spent_rune == "2100034"
---
########################################################################################
# verify correct vault and pool balances
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/vault/{{ pubkey_dog }}
asserts:
  - .coins[]|select(.asset=="ETH.ETH")|.amount|tonumber == 1000000000-21000-21000-1000
---
type: check
endpoint: http://localhost:1317/thorchain/pool/eth.eth
asserts:
  - .balance_asset|tonumber == 1000000000-21000-21000-1000
