params:
  from_asset: THOR.RUNE
  to_asset: BTC.BTC
  amount: 1000000000
  tolerance_bps: 1000
  destination: {{ addr_btc_fox }}
  affiliate: {{ addr_thor_pig }}
  affiliate_bps: 500
asserts:
  - .memo == "=:b:{{ addr_btc_fox }}:960426:{{ addr_thor_pig }}:500"
  - (.expected_amount_out|tonumber) == (${AMT_OUT} - (${AMT_OUT} + ${OF}) * 0.05 - ${ROUNDING=0.05} | floor)
  - .recommended_min_amount_in == "23614501"
  - .fees.affiliate == "52279"
  - .fees.liquidity == "10946"
  - .fees.outbound == "7000"
  - (.fees.total|tonumber) == (.fees.liquidity|tonumber)+(.fees.outbound|tonumber)+(.fees.affiliate|tonumber)
  - .fees.slippage_bps == 103
  - .fees.total_bps == 629
