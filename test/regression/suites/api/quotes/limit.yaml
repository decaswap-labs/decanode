########################################################################################
# Test market order (default) for comparison
########################################################################################
type: check
endpoint: http://localhost:1317/thorchain/quote/swap
params:
  from_asset: BTC.BTC
  to_asset: ETH.ETH
  amount: 100000000
  destination: {{ addr_eth_fox }}
asserts:
  - .expected_amount_out|tonumber > 0
  - .memo|startswith("=:")
  - has("order_expiry_block")|not
  - has("order_expiry_timestamp")|not
  - has("current_ratio")|not
  - has("trigger_ratio")|not
  - .inbound_address == "{{ addr_btc_dog }}"
