type: env
key: L1_SLIP_MIN_BPS
value: 50
---
{{ template "default-state.yaml" }}
---
{{ template "btc-eth-3usd-pool-state.yaml" }}
---
type: create-blocks
count: 1
---
# PreferredAssetOutboundFeeMultiplier -> 10
type: tx-mimir
key: PreferredAssetOutboundFeeMultiplier
value: 10
signer: {{ addr_thor_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/mimir
asserts:
  - .PREFERREDASSETOUTBOUNDFEEMULTIPLIER == 10
---
########################################################################################
# Setup affiliate w preferred asset of ETH.USDX-0X9999999999999999999999999999999999999999
########################################################################################
type: tx-send
from_address: {{ addr_thor_fox }}
to_address: {{ addr_thor_pig }}
amount:
  - amount: "15000000000"
    denom: "rune"
---
type: create-blocks
count: 1
---
type: tx-deposit
signer: {{ addr_thor_pig }}
coins:
  - amount: "5000000000"
    asset: "rune"
memo: "~:test:THOR:{{ addr_thor_pig }}:{{ addr_thor_pig }}:ETH.USDX-0X9999999999999999999999999999999999999999"
---
type: create-blocks
count: 1
---
type: tx-deposit
signer: {{ addr_thor_pig }}
coins:
  - amount: "5000000000"
    asset: "rune"
memo: "~:test:ETH:{{ addr_eth_pig }}"
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/thorname/test
asserts:
  - .aliases[0].address == "{{ addr_thor_pig }}"
  - .aliases[1].address == "{{ addr_eth_pig }}"
  - .owner == "{{ addr_thor_pig }}"
  - .preferred_asset == "ETH.USDX-0X9999999999999999999999999999999999999999"
---
type: tx-deposit
signer: {{ addr_thor_cat }}
coins:
  - amount: "15000000000"
    asset: "rune"
memo: "=:BTC.BTC:{{ addr_btc_cat }}:0/0/1:test:500"
---
type: create-blocks
count: 2
---
type: check
endpoint: http://localhost:1317/thorchain/thorname/test
asserts:
  - .affiliate_collector_rune == "724751541"
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 1
  - .[0]|.coin.amount|tonumber == ${OUT_AMOUNT=10767967}
---
# Observe the outbound.
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 1 }}"
      chain: BTC
      from_address: {{ addr_btc_dog }}
      to_address: {{ addr_btc_cat }}
      coins:
        - amount: "${OUT_AMOUNT}"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10500"
          asset: "BTC.BTC"
      memo: "OUT:{{ native_txid -1 }}"
    block_height: 6
    finalise_height: 6
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 0
---
########################################################################################
# swap BTC -> RUNE w/ "test" affiliate
########################################################################################
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 2 }}"
      chain: BTC
      from_address: {{ addr_btc_fox }}
      to_address: {{ addr_btc_dog }}
      coins:
        - amount: "15000000"
          asset: "BTC.BTC"
          decimals: 8
      gas:
        - amount: "10000"
          asset: "BTC.BTC"
      memo: "=:THOR.RUNE:{{ addr_thor_fox }}:0/0/1:test:200"
    block_height: 4
    finalise_height: 4
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 2
---
type: check
endpoint: http://localhost:1317/thorchain/thorname/test
asserts:
  - .affiliate_collector_rune == "0"
---
########################################################################################
# streaming swap to rune to trigger preferred asset swap
########################################################################################
type: check
endpoint: http://localhost:1317/cosmos/bank/v1beta1/balances/{{ addr_thor_fox }}
asserts:
  - .balances|length == 1
  - .balances[]|select(.denom == "rune")|.amount|tonumber == ${FOX_BAL=2498769806132}
---
type: tx-observed-in
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "{{ observe_txid 3 }}"
      chain: ETH
      from_address: {{ addr_eth_fox }}
      to_address: {{ addr_eth_dog }}
      coins:
        - amount: "30000000"
          asset: "ETH.ETH"
          decimals: 8
      gas:
        - amount: "1280000"
          asset: "ETH.ETH"
      memo: "=:r:{{ addr_thor_fox }}:0/1/0:test:1000"
    block_height: 8
    finalise_height: 8
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/swap/streaming/{{ observe_txid 3 }}
asserts:
  - .deposit == "30000000"
  - .in == "5000000"
  - .count == 1
  - .interval == 1
  - .quantity == 6
  - .out == "495043155"
  - .last_height == 11
  - .trade_target == "0"
  - .failed_swaps|length == 0
  - .failed_swap_reasons|length == 0
---
type: create-blocks
count: 3
---
type: check
endpoint: http://localhost:1317/thorchain/queue/swap/details/{{ observe_txid 3 }}
asserts:
  - .swap.state.deposit == "30000000"
  - .swap.state.in == "20000000"
  - .swap.state.count == 4
  - .swap.state.interval == 1
  - .swap.state.quantity == 6
  - .swap.state.out == "1951134377"
  - .swap.state.last_height == 14
  - .swap.trade_target == "0"
  - .swap.state.failed_swaps|length == 0
  - .swap.state.failed_swap_reasons|length == 0
---
type: create-blocks
count: 2
---
type: check
endpoint: http://localhost:1317/bank/balances/{{ addr_thor_fox }}
asserts:
  - .result|length == 1
  - .result[]|select(.denom == "rune").amount|tonumber == ${FOX_BAL} + 2608525254
---
type: check
endpoint: http://localhost:1317/thorchain/thorname/test
asserts:
  - .affiliate_collector_rune == "289836139"
---
type: check
endpoint: http://localhost:1317/thorchain/swaps/streaming
asserts:
  - .|length == 0
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 1
  - .[0]|.in_hash == "${IN_HASH=026ECD3F2BD10125EA1B27C0571B8CA1FC6A69467CB88CA462F4CD1E87D9A6D2}"
  - .[0]|.coin.asset == "ETH.USDX-0X9999999999999999999999999999999999999999"
  - .[0]|.coin.amount == "${OUT_AMOUNT=923121100}"
---
type: tx-observed-out
signer: {{ addr_thor_dog }}
txs:
  - tx:
      id: "${IN_HASH}"
      chain: ETH
      from_address: {{ addr_eth_dog }}
      to_address: {{ addr_eth_pig }}
      coins:
        - amount: "${OUT_AMOUNT}"
          asset: "ETH.USDX-0X9999999999999999999999999999999999999999"
      gas:
        - amount: "960000"
          asset: "ETH.ETH"
      memo: "OUT:${IN_HASH}"
    block_height: 9
    finalise_height: 9
    observed_pub_key: {{ pubkey_dog }}
---
type: create-blocks
count: 1
---
type: check
endpoint: http://localhost:1317/thorchain/queue/outbound
asserts:
  - .|length == 0
