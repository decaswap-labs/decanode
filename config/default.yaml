      scanner_leveldb: *default-leveldb

    noble:
      <<: *default-chain
      chain_id: NOBLE
      cosmos_chain_id: "noble-1"
      block_scanner:
        <<: *default-block-scanner
        chain_id: NOBLE
        gas_price_resolution: 100_000
        observation_flexibility_blocks: 40
        whitelist_cosmos_assets:
          - symbol: USDC
            decimals: 6
            denom: uusdc
          - symbol: USDY
            decimals: 18
            denom: ausdy
          - symbol: EURE
            decimals: 6
            denom: ueure
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb

    xrp:
      <<: *default-chain
      chain_id: XRP
      solvency_blocks: 10
      block_scanner:
        <<: *default-block-scanner
        chain_id: XRP
        gas_price_resolution: 100 # drops
        observation_flexibility_blocks: 40
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb

    ltc:
      <<: *default-chain
      chain_id: LTC
      block_scanner:
        <<: *default-block-scanner
        max_reorg_rescan_blocks: 288 # 12h
        chain_id: LTC
        observation_flexibility_blocks: 3
        gas_cache_blocks: 10
        gas_price_resolution: 10 # sats/vbyte
        scan_mempool: false
      mempool_tx_id_cache_size: 1_000_000
      scanner_leveldb: *default-leveldb
      utxo:
        <<: *utxo
        block_cache_count: 600
        max_sats_per_vbyte: 9765 # backwards compatible with 1e8/10/1024
        min_sats_per_vbyte: 2
        estimated_average_tx_size: 250

    bch:
      <<: *default-chain
      chain_id: BCH
      block_scanner:
        <<: *default-block-scanner
        max_reorg_rescan_blocks: 72 # 12h
        chain_id: BCH
        observation_flexibility_blocks: 3
      mempool_tx_id_cache_size: 1_000_000
      scanner_leveldb: *default-leveldb
      utxo:
        <<: *utxo
        block_cache_count: 144
        max_sats_per_vbyte: 9765 # backwards compatible with 1e8/10/1024
        min_sats_per_vbyte: 2
        estimated_average_tx_size: 1500
        max_mempool_ancestors: 0 # BCH removed ancestor limits in May 2021

    sol:
      <<: *default-chain
      chain_id: SOL
      block_scanner:
        <<: *default-block-scanner
        block_height_discover_back_off: 0.2s
        max_reorg_rescan_blocks: 0 # solana has guaranteed finality
        chain_id: SOL
        observation_flexibility_blocks: 0
        gas_cache_blocks: 100
        gas_price_resolution: 100 # 100 lamports
        max_gas_limit: 0
        max_contract_tx_logs: 0
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb
      solvency_blocks: 50

    zec:
      <<: *default-chain
      chain_id: ZEC
      block_scanner:
        <<: *default-block-scanner
        max_reorg_rescan_blocks: 576 # 12h
        chain_id: ZEC
        observation_flexibility_blocks: 3
      mempool_tx_id_cache_size: 1_000_000
      scanner_leveldb: *default-leveldb
      utxo:
        <<: *utxo
        block_cache_count: 1152
        max_sats_per_vbyte: 9765 # backwards compatible with 1e8/10/1024
        min_sats_per_vbyte: 2
        estimated_average_tx_size: 10000
        max_mempool_ancestors: 0

    sui:
      <<: *default-chain
      disabled: true
      chain_id: SUI
      block_scanner:
        <<: *default-block-scanner
        block_height_discover_back_off: 0.2s
        max_reorg_rescan_blocks: 0 # sui has guaranteed finality
        chain_id: SUI
        observation_flexibility_blocks: 0
        gas_cache_blocks: 100
        gas_price_resolution: 10000 # 0.00001 SUI
        max_gas_limit: 0
        max_contract_tx_logs: 0
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb
      solvency_blocks: 200

    ada:
      <<: *default-chain
      disabled: true
      chain_id: ADA
      block_scanner:
        <<: *default-block-scanner
        block_height_discover_back_off: 1s
        max_reorg_rescan_blocks: 2500
        chain_id: ADA
        observation_flexibility_blocks: 0
        gas_cache_blocks: 100
        gas_price_resolution: 1000 # 1000 lovelace
        max_gas_limit: 0
        max_contract_tx_logs: 0
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb
      solvency_blocks: 3

  oracle:
    log_level: info
    enabled: false
    detailed_metrics: false
  providers:
    binance:
      name: binance
      disabled: false
      polling_interval: 3s
      api_endpoints:
        - https://data-api.binance.vision
      ws_endpoints:
        - wss://stream.binance.com:9443/ws
      pairs:
        - ATOM/USDT
        - AVAX/USDT
        - BCH/USDT
        - BNB/USDT
        - BTC/USDT
        - DOGE/USDT
        - ETH/USDT
        - LTC/USDT
        - RUNE/USDT
        - SOL/USDT
        - TRX/USDT
        - USDC/USDT
        - XRP/USDT
        - ZEC/USDT
      symbol_mapping: []

    bitfinex:
      name: bitfinex
      disabled: true
      polling_interval: 3s
      api_endpoints:
        - https://api-pub.bitfinex.com
      ws_endpoints:
        - wss://api-pub.bitfinex.com/ws/2
      pairs:
        - BTC/USD
        - ETH/USD
        - USDT/USD
        - XRP/USDT
        - DOGE/USD
      symbol_mapping:
        - USDT/USD=tUSTUSD
        - XRP/USDT=tXRPUST

    bitget:
      name: bitget
      disabled: false
      polling_interval: 2s
      api_endpoints:
        - https://api.bitget.com
      ws_endpoints:
        - wss://ws.bitget.com/v2/ws/public
      pairs:
        - AVAX/USDT
        - BCH/USDT
        - BNB/USDT
        - BTC/USDC
        - BTC/USDT
        - DOGE/USDT
        - ETH/USDT
        - LTC/USDT
        - RUNE/USDT
        - SOL/USDT
        - XRP/USDT
      symbol_mapping: []

    bitmart:
      name: bitmart
      disabled: false
      polling_interval: 3s
      api_endpoints:
        - https://api-cloud.bitmart.com
      ws_endpoints:
        - wss://ws-manager-compress.bitmart.com/api?protocol=1.1
      pairs:
        - AVAX/USDT
        - BTC/USDT
        - ETH/USDT
        - RUNE/USDT
        - ZEC/USDT
      symbol_mapping: []

    bitstamp:
      name: bitstamp
      disabled: false
      polling_interval: 2s
      api_endpoints:
        - https://www.bitstamp.net
      ws_endpoints: []
      pairs:
        - BTC/USD
        - USDC/USD
        - USDT/USD
      symbol_mapping: []

    bybit:
      name: bybit
      disabled: false
      polling_interval: 5s
      api_endpoints:
        # check https://bybit-exchange.github.io/docs/v5/guide
        - https://api.bybit.com
        - https://api.bytick.com
      ws_endpoints:
        - wss://stream.bybit.com/v5/public/spot
      pairs:
        - ATOM/USDT
        - AVAX/USDT
        - BCH/USDT
        - BNB/USDT
        - BTC/USDT
        - DOGE/USDT
        - ETH/USDT
        - LTC/USDT
        - RUNE/USDT
        - SOL/USDT
        - TRX/USDT
        - USDC/USDT
        - XRP/USDT
      symbol_mapping: []

    coinbase:
      name: coinbase
      disabled: false
      polling_interval: 10s
      api_endpoints:
        - https://api.exchange.coinbase.com
      ws_endpoints:
        - wss://ws-feed.exchange.coinbase.com
      pairs:
        - ATOM/USD
        - AVAX/USD
        - BCH/USD
        - BTC/USD
