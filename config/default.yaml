########################################################################################
# Bifrost
########################################################################################
# trunk-ignore-all(codespell/misspelled)
bifrost:
  # leveldb defaults to start, plus 10 bit per key filter
  observer_leveldb: &default-leveldb
    filter_bits_per_key: 10
    compaction_table_size_multiplier: 1
    write_buffer: 4194304
    block_cache_capacity: 8388608
    compact_on_init: false
  observer_workers: 0

  metrics:
    enabled: true
    pprof_enabled: false
    listen_port: 9000
    read_timeout: 30s
    write_timeout: 30s
    chains:
      - AVAX
      - BCH
      - BTC
      - DOGE
      - ETH
      - GAIA
      - LTC
      - BSC
      - BASE
      - TRON
      - XRP
      - NOBLE
      - SOL
      - POL
      - ZEC
  thorchain:
    chain_id: thorchain
    chain_host: localhost:1317
    chain_rpc: ""
    chain_ebifrost: localhost:50051
    chain_home_folder: ""
    signer_name: ""
  attestation_gossip:
    observe_reconcile_interval: 15s
    late_observe_timeout: 5m
    non_quorum_timeout: 10h
    min_time_between_attestations: 30s
    ask_peers: 10
    ask_peers_delay: 5s
    max_batch_size: 100
    batch_interval: 2s
    peer_timeout: 20s
    peer_concurrent_sends: 4
    peer_concurrent_receives: 5
  signer:
    backup_keyshares: true
    signer_db_path: /var/data/bifrost/signer_db
    retry_interval: 2s
    reschedule_buffer_blocks: 150 # 15 minutes
    block_scanner:
      chain_id: ThorChain
      start_block_height: 0
      block_retry_interval: 10s
      block_height_discover_back_off: 5s
      block_scan_processors: 1
      start_block: "0"
      http_request_timeout: 30s
      http_request_read_timeout: 30s
      http_request_write_timeout: 30s
      max_http_request_retry: "10"
    leveldb: *default-leveldb
    auto_observe: true
    keygen_timeout: 5m
    keysign_timeout: 45s
    party_timeout: 45s
    pre_param_timeout: 5m
  tss:
    rendezvous: asgard
    p2p_port: 5040
    info_address: :6040
    bootstrap_peers: ""
    external_ip: ""
    max_keyshare_recover_scan_blocks: 100
  chains:
    btc: &default-chain
      disabled: false
      chain_id: BTC
      cosmos_chain_id: ""
      username: thorchain
      password: password
      http_post_mode: 1
      disable_tls: 1
      parallel_mempool_scan: 5
      mempool_tx_id_cache_size: 1_000_000
      scanner_leveldb:
        <<: *default-leveldb
        compaction_table_size_multiplier: 10
        write_buffer: 20971520 # 20mb
        block_cache_capacity: 536870912 # 512mb
      min_confirmations: 0
      max_rpc_retries: 9 # about 1 min
      max_pending_nonces: 0
      authorization_bearer: ""
      evm:
        max_gas_tip_percentage: 0
        token_max_gas_multiplier: 0
        aggregator_max_gas_multiplier: 0
        extra_l1_gas_fee: 0
        reconstruct_liabilities_concurrency: 0
      utxo: &utxo
        block_cache_count: 144
        transaction_batch_size: 500
        max_mempool_batches: 10
        estimated_average_tx_size: 1000
        default_min_relay_fee_sats: 1000
        default_sats_per_vbyte: 25
        max_sats_per_vbyte: 9765 # backwards compatible with 1e8/10/1024
        min_sats_per_vbyte: 2
        min_utxo_confirmations: 1
        max_utxos_to_spend: 10
        max_mempool_ancestors: 25 # BTC/LTC/DOGE limit is 25 (GetMempoolEntry ancestorcount includes the tx itself)
      block_scanner: &default-block-scanner
        max_reorg_rescan_blocks: 72 # 12h
        chain_id: BTC
        enforce_block_height: false
        block_scan_processors: 1
        block_height_discover_back_off: 5s
        observation_flexibility_blocks: 3
        block_retry_interval: 10s
        http_request_timeout: 30s
        http_request_read_timeout: 30s
        http_request_write_timeout: 30s
        max_http_request_retry: 10
        db_path: /var/data/bifrost/observer
        scan_mempool: true
        max_contract_tx_logs: 0

        # the following defaults must be defined to override with environment
        start_block_height: 0
        cosmos_grpc_host: ""
        cosmos_grpc_tls: false
        gas_cache_blocks: 0
        whitelist_tokens: []
        whitelist_cosmos_assets: []
        concurrency: 0
        prefetch_blocks: 0
        max_gas_limit: 0
        fixed_gas_rate: 0
        gas_price_resolution: 1 # 1 sats/vbyte
        max_resume_block_lag: 1h
        max_healthy_lag: 30m
        transaction_batch_size: 500
        reference_address: ""
        solana:
          scan_interval: 15s
          scan_inactive_vaults: false
          fee_update_interval: 50
          fee_sample_slots: 10

      # the following defaults must be defined to override with environment
      chain_host: ""
      chain_network: ""
      rpc_host: ""
      api_host: ""
      cosmos_grpc_host: ""
      cosmos_grpc_tls: false
      opt_to_retire: false
      solvency_blocks: 0

    eth:
      <<: *default-chain
      chain_id: ETH
      max_pending_nonces: 3
      evm:
        max_gas_tip_percentage: 20
        token_max_gas_multiplier: 3
        aggregator_max_gas_multiplier: 10
        extra_l1_gas_fee: 0
        reconstruct_liabilities_concurrency: 8
      block_scanner:
        <<: *default-block-scanner
        max_reorg_rescan_blocks: 96 # 3 epochs
        gas_cache_blocks: 40
        concurrency: 1
        chain_id: ETH
        observation_flexibility_blocks: 20
        max_gas_limit: 100000
        max_contract_tx_logs: 200
        gas_price_resolution: 10 # 10 gwei
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb

    base:
      <<: *default-chain
      chain_id: BASE
      solvency_blocks: 100
      max_pending_nonces: 3
      evm:
        max_gas_tip_percentage: 20
        token_max_gas_multiplier: 3
        aggregator_max_gas_multiplier: 10
        # deteremined as 90th percentile of observed delta across 1 month on mainnet nodes
        extra_l1_gas_fee: 700
        reconstruct_liabilities_concurrency: 8
      block_scanner:
        <<: *default-block-scanner
        gas_cache_blocks: 40
        concurrency: 4
        prefetch_blocks: 4
        chain_id: BASE
        observation_flexibility_blocks: 20
        max_gas_limit: 100000
        max_contract_tx_logs: 200
        gas_price_resolution: 100 # mwei
        whitelist_tokens:
          - 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913 # USDC
          - 0xcbB7C0000aB88B473b1f5aFd9ef808440eed33Bf # cbBTC
          - 0xacfE6019Ed1A7Dc6f7B508C02d1b04ec88cC21bf # Venice (VVV)
          - 0x0b3e328455c4059EEb9e3f84b5543F74E24e7E1b # Virtuals
          # - 0x4ed4E862860beD51a9570b96d89aF5E1B0Efefed # Degen
          # - 0x0578d8A44db98B23BF096A382e016e29a5Ce0ffe # Higher
          # - 0x1bc0c42215582d5A085795f4baDbaC3ff36d1Bcb # Clanker
          - 0x60a3E35Cc302bFA44Cb288Bc5a4F316Fdb1adb42 # EURC
          - 0xcbada732173e39521cdbe8bf59a6dc85a9fc7b8c # cbADA
          - 0xcbd06e5a2b0c65597161de254aa074e489deb510 # cbDOGE
          - 0xcb17c9db87b595717c857a08468793f5bab6445f # cbLTC
          - 0xcb585250f852c6c6bf90434ab21a00f02833a4af # cbXRP
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb

    pol:
      <<: *default-chain
      chain_id: POL
      solvency_blocks: 50
      max_pending_nonces: 3
      evm:
        max_gas_tip_percentage: 20
        token_max_gas_multiplier: 3
        aggregator_max_gas_multiplier: 10
        extra_l1_gas_fee: 0
        reconstruct_liabilities_concurrency: 8
      block_scanner:
        <<: *default-block-scanner
        max_reorg_rescan_blocks: 96 # 3 epochs
        gas_cache_blocks: 40
