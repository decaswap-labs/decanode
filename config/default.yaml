########################################################################################
# Thor
########################################################################################

thor:
  node_relay_url: https://node-relay-bot.herokuapp.com
  vault_pubkeys_cutoff_blocks: 1_000_000
  seed_nodes_endpoint: https://gateway.liquify.com/chain/thorchain_api/thorchain/nodes
  stagenet_admin_addresses: "sthor1gdq9qejfy33jctztqdrg5v4hvxnytmvjhduacc" # 9R official stagenet
  api:
    quote:
      recommended_min_amount_fee_multiplier: 3 # the multiplier for calculateMinSwapAmount
      max_lag: 3m
    pagination:
      default_page_size: 100
      max_page_size: 1000
  telemetry:
    slash_points: false
    price_per_node: false

  log_filter:
    modules:
      - api-server
      - consensus
      - evidence
      - mempool
      - p2p
      - pex
      - rpc
      - rpc-server
      - txindex
      - x/bank
    messages:
      - executed block
      - commit synced

  auto_state_sync:
    enabled: false
    block_buffer: 150_000
    peers:
      # NOTE: example format only, endpoints being decommissioned.
      - c3613862c2608b3e861406ad02146f41cf5124e6@statesync-seed.ninerealms.com:27146
      - dbd1730bff1e8a21aad93bc6083209904d483185@statesync-seed-2.ninerealms.com:27146
  cosmos:
    pruning: nothing
    halt_height: 0
    min_retain_blocks: 0
    telemetry:
      enabled: false
      prometheus_retention_time: 600
    api:
      enable: true
      enabled_unsafe_cors: true
      enabled_swagger: true
      address: tcp://0.0.0.0:1317
    grpc:
      enable: false
      address: 0.0.0.0:9090
    ebifrost:
      enable: true
      address: 127.0.0.1:50051
      cache_item_ttl: 30m
    state_sync:
      snapshot_interval: 0
      snapshot_keep_recent: 2
    wasm:
      query_gas_limit: 3000000
      memory_cache_size: 100
  tendermint:
    log:
      level: info
      format: plain
    rpc:
      listen_address: "" # set dynamically
      cors_allowed_origin: "*"
      experimental_subscription_buffer_size: 200
      experimental_websocket_write_buffer_size: 200
    p2p:
      listen_address: "" # set dynamically
      seeds: "" # set dynamically
      external_address: ""
      persistent_peers: ""
      addr_book_strict: false
      max_num_inbound_peers: 40
      max_num_outbound_peers: 10
      allow_duplicate_ip: true
    consensus:
      timeout_commit: 5s
      # these can be set to 1ms temporarily to recover from consensus failure faster
      timeout_propose_delta: 500ms
      timeout_prevote_delta: 500ms
      timeout_precommit_delta: 500ms
    state_sync:
      enable: false
      # Must be archive nodes. Liquify will be the trusted source by default.
      rpc_servers: https://gateway.liquify.com/chain/thorchain_rpc,https://gateway.liquify.com/chain/thorchain_rpc
      trust_height: 0
      trust_hash: ""
      trust_period: 360h0m0s
    instrumentation:
      prometheus: true
