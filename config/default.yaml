      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb

    tron:
      <<: *default-chain
      chain_id: TRON
      block_scanner:
        <<: *default-block-scanner
        chain_id: TRON
        gas_price_resolution: 100_000
        observation_flexibility_blocks: 40
        scan_mempool: false
        # TCpyVx6RVmrQsE3Xo3epB7y1CdJdCdAwAx is a generated address,
        # funded with 1 TRX & 1 USDT initially
        reference_address: "TCpyVx6RVmrQsE3Xo3epB7y1CdJdCdAwAx"
        whitelist_tokens:
          - TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t # USDT
      mempool_tx_id_cache_size: 0
      scanner_leveldb: *default-leveldb

    avax:
      <<: *default-chain
      chain_id: AVAX
      solvency_blocks: 100
      max_pending_nonces: 3
      evm:
        token_max_gas_multiplier: 3
        aggregator_max_gas_multiplier: 10
        max_gas_tip_percentage: 0
        extra_l1_gas_fee: 0
        reconstruct_liabilities_concurrency: 8
